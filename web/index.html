<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title> Gesture Calibration</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            background: #111;
            color: #eee
        }
        .wrap{
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;

        }
        .card{
            background: #1b1b1b;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label{
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
        }
        input[type="range"], input[type="number"], input[type="text"]{
            width: 100%;
        }

        button{
            margin-top: 12px;
            padding: 10px,16px;
            border: 0;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            cursor: pointer;
        }
        .row{
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 12px;
            align-items: center;
        }
        pre{
            background: #0b0b0b;
            padding: 12px;
            border-radius: 12px;
            overflow: auto;
        }
        .gesture-table{
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .gesture-table td, .gesture-table th{
            padding: 8px 12px;
            border: 1px solid #333;
            text-align: left;
        }
        .gesture-table th{
            background: #222;
            color: #aaa;
        }
        .fingers{
            font-family: monospace;
            letter-spacing: 4px;
            font-size: 18px;
        }
    </style>

</head> 
<body>
    <div class="wrap">
        <h1>Gesture Calibration</h1>

        <div class="card">
            <h2>Calibration</h2>
            <div class="row">
                <div>
                    <label>Mouse Smoothing</label>
                    <input id="mouse_smooth" type="range" min="0.01" max="1" step="0.01">
                </div>
                <input id="mouse_smooth_value" type="number" step="0.01">
            </div> 

            <div class="row">
                <div>
                    <label>Deadzone</label>
                    <input id="deadzone" type="range" min="0" max="50" step="1">
                </div>
                <input id="deadzone_value" type="number" step="1">
            </div> 
            
            <div class="row">
                <div>
                    <label>Swipe Threshold</label>
                    <input id="swipe_threshold" type="range" min="5" max="200" step="1">
                </div>
                <input id="swipe_threshold_value" type="number" step="1">
            </div>       

            <div class="row">     
                <div>
                    <label>Scroll Threshold</label>
                    <input id="scroll_threshold" type="range" min="5" max="200" step="1">
                </div>
                <input id="scroll_threshold_value" type="number" step="1">
            </div>

            <div class="row">
                <div>
                    <label>Scroll Delay</label>
                    <input id="scroll_delay" type="range" min="0.05" max="2" step="0.05">
                </div>
                <input id="scroll_delay_value" type="number" step="0.05">
            </div>

            <div class="row">
                <div>
                    <label>Gesture Delay</label>
                    <input id="gesture_delay" type="range" min="0.1" max="5" step="0.1">
                </div>
                <input id="gesture_delay_value" type="number" step="0.1">
            </div>

            <div class="row">
                <div>
                    <label>Zoom Threshold</label>
                    <input id="zoom_threshold" type="range" min="5" max="100" step="1">
                </div>
                <input id="zoom_threshold_value" type="number" step="1">
            </div>

            <button id="saveButton">Save</button>
        </div>

        <div class="card">
            <h2>Commands</h2>
            <div id="commandsList"></div>
            <button id="addCommandButton">Add command</button>
        </div>

        <div class="card">
            <h2>Gestures</h2>
            <table class="gesture-table">
                <thead>
                    <tr>
                        <th>Fingers (idx mid rng pnk)</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td><span class="fingers"></span> 1 0 0 0</td><td>Move mouse</td></tr>
                    <tr><td><span class="fingers"></span> 1 1 0 0</td><td>Left click</td></tr>
                    <tr><td><span class="fingers"></span> 0 1 0 0</td><td>Right click</td></tr>
                    <tr><td><span class="fingers"></span> 1 1 1 0</td><td>Swipe</td></tr>
                    <tr><td><span class="fingers"></span> 0 0 0 1</td><td>Scroll (up/down)</td></tr>
                    <tr><td><span class="fingers"></span> thumb+1 0 0 0</td><td>Zoom in / out</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Status</h2>
            <pre id="statusBox">Loading...</pre>
        </div>
    </div>

    <script src="/web/app.js"></script>
</body>

</html>
